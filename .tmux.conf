# =============================================================================
#  tmux.conf
#  Entrypoint for the tmux configuration.
#
#  Load order:
#    1. Plugins          (TPM plugin list + plugin options)
#    2. Native tmux      (options, keybindings, hooks)
#    3. Local overrides  (personal theme/local machine settings)
#    4. TPM init         (must stay last)
# =============================================================================

source-file ~/.tmux.conf.plugins
source-file ~/.tmux.conf.native

if-shell '[ -f ~/.tmux.conf.local ]' 'source-file ~/.tmux.conf.local'

# TPM init must run after every @plugin declaration and plugin option.
run '~/.tmux/plugins/tpm/tpm'
