# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
format = "$directory$character"
right_format = "$buf$bun$c$cmake$cobol$cpp$crystal$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$meson$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pixi$purescript$python$quarto$raku$red$rlang$ruby$rust$scala$solidity$swift$terraform$typst$vagrant$vlang$xmake$zig"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[username]
disabled = true

[os]
disabled = true

[line_break]
disabled = true

# Keep tool modules compact in the right prompt.
[buf]
format = "[$symbol($version )]($style)"

[bun]
format = "[$symbol($version )]($style)"

[c]
format = "[$symbol($version(-$name) )]($style)"

[cmake]
format = "[$symbol($version )]($style)"

[cobol]
format = "[$symbol($version )]($style)"

[cpp]
format = "[$symbol($version(-$name) )]($style)"

